x-common-env: &common-env
  TZ: ${TZ}
  PUID: ${PUID}
  PGID: ${PGID}
  UMASK: ${UMASK}

x-certs-volume: &certs-volume ${CERTS}:/certs:ro

x-not-arr-labels: &not-arr-labels
  homepage.group: Stuff
  homepage.showStats: false

x-arr-labels: &arr-labels
  homepage.group: Arr
  homepage.showStats: false

x-logging-labels: &logging-labels
  logging: promtail
  jobname: container_logs

services:
  tdarr:
    image: "ghcr.io/haveagitgat/tdarr:latest"
    container_name: tdarr
    profiles: ['not-arr']
    environment:
      <<: *common-env
      serverUrl: ${TDARR_URL}
      webUIPort: 8265
      internalNode: true
      inContainer: true
      ffmpegVersion: 7
      nodeName: "TdarrServer"
      auth: false
      openBrowser: true
      maxLogSizeMB: 10
      cronPluginUpdate:
    volumes:
      - ${DOCKER_CONFIG}/tdarr/server:/app/server
      - ${DOCKER_CONFIG}/tdarr/configs:/app/configs
      - ${DOCKER_CONFIG}/tdarr/logs:/app/logs
      - ${FILESHARE}:/data
      - ${DOCKER_CONFIG}/tdarr/transcode_cache:/temp
    ports:
      - 8265:8265 # webUI port
      - 8266:8266 # server port
    networks:
      - "defaultNet"
    restart: unless-stopped
    group_add:
      - '105'
    devices:
      - /dev/dri/card0:/dev/dri/card0
      - /dev/dri/renderD128:/dev/dri/renderD128
    labels:
      <<: *not-arr-labels
      homepage.name: Tdarr
      homepage.icon: tdarr.png
      homepage.description: Transcoding Pipeline
      homepage.href: https://tdarr.${DOMAIN}
      homepage.showStats: false
      homepage.weight: 15

  jellyfin:
    image: "jellyfin/jellyfin:10.11"
    container_name: jellyfin
    hostname: jellyfin
    profiles: ['not-arr']
    user: ${PUID}:${PGID}
    environment:
      <<: *common-env
    volumes:
      # Config
      - "jellyfin.conf:/config"
      # Media
      - ${FILESHARE}:/videos
    tmpfs:
      - "/cache:uid=${PUID},gid=${PGID}"
    ports:
      - 8096:8096/tcp
      - 8920:8920/tcp
    networks:
      - "defaultNet"
    restart: "unless-stopped"
    group_add:
      - '105'
    devices:
      - /dev/dri/card0:/dev/dri/card0
      - /dev/dri/renderD128:/dev/dri/renderD128
    labels:
      <<: *not-arr-labels
      homepage.name: Jellyfin
      homepage.icon: jellyfin.png
      homepage.description: Movies & TV Shows
      homepage.href: https://jellyfin.${DOMAIN}
      homepage.showStats: false
      homepage.weight: 10

## Arr ##
  gluetun:
    image: "qmcgaw/gluetun:v3"
    container_name: gluetun
    profiles: ['arr']
    environment:
      <<: *common-env
      # Mullvad-WG
      VPN_SERVICE_PROVIDER: mullvad
      VPN_TYPE: wireguard
      WIREGUARD_PRIVATE_KEY: ${WIREGUARD_PRIVATE_KEY}
      WIREGUARD_ADDRESSES: 10.73.70.3/32
      WIREGUARD_ENDPOINT_PORT: 52001
      SERVER_COUNTRIES: Sweden

      # Options
      SHADOWSOCKS: off
      FIREWALL: on
      FIREWALL_OUTBOUND_SUBNETS: 10.40.40.0/24,10.255.255.0/24
      DOT: on
      UPDATER_PERIOD: 48h
      OWNED_ONLY: on
    ports:
      - 8000:8000/tcp # Homepage IP parse
      - 6555:6555/tcp # qBit WebUI
      - 6868:6868/tcp # Profilarr
      - 9898:9898/tcp # Radarr TLS
      - 9897:9897/tcp # Sonarr TLS
      - 6969:6969/tcp # Prowlarr TLS
      - 9705:9705/tcp # Huntarr
    volumes:
      - "gluetun.conf:/gluetun"
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    networks:
      - "arrNet"
    restart: "unless-stopped"
    labels:
      <<: *arr-labels
      homepage.name: Gluetun
      homepage.icon: mullvad.png
      homepage.widget.type: gluetun
      homepage.widget.url: http://docker.internal.${DOMAIN}:8000
      homepage.weight: 10

  qbit:
    image: "11notes/qbittorrent:5.1.4"
    container_name: qbit
    profiles: ['arr']
    user: ${PUID}:${PGID}
    environment:
      TZ: ${TZ}
    volumes:
      - "qbittorrent.etc:/qbittorrent/etc"
      - "qbittorrent.var:/qbittorrent/var"
      # To conform with arrs directory mappings without using path mappings
      - ${FILESHARE}/Downloads:/data/Downloads
    network_mode: "service:gluetun"
    restart: "unless-stopped"
    labels:
      <<: *arr-labels
      homepage.name: qBittorrent
      homepage.icon: qbittorrent.png
      homepage.description: Torrent Client
      homepage.href: https://qbit.${DOMAIN}
      homepage.weight: 50

  sonarr:
    image: "11notes/sonarr:4.0.15"
    container_name: sonarr
    read_only: true
    profiles: ['arr']
    user: ${PUID}:${PGID}
    environment:
      TZ: ${TZ}
    volumes:
      - "sonarr.etc:/sonarr/etc"
      - ${ARR_BACKUPS}/sonarr:/config/backups
      - ${FILESHARE}:/data
      - *certs-volume
    tmpfs:
      - "/tmp:uid=${PUID},gid=${PGID}"
    network_mode: "service:gluetun"
    restart: "unless-stopped"
    labels:
      <<: *arr-labels
      homepage.name: Sonarr
      homepage.icon: sonarr.png
      homepage.description: Download TV Shows
      homepage.href: https://sonarr.${DOMAIN}
      homepage.weight: 30
      homepage.widget.type: sonarr
      homepage.widget.url: https://docker.internal.${DOMAIN}:9897
      homepage.widget.key: ${SONARR_API_KEY}

  radarr:
    image: "11notes/radarr:6"
    container_name: radarr
    read_only: true
    profiles: ['arr']
    user: ${PUID}:${PGID}
    environment:
      TS: ${TZ}
    volumes:
      - "radarr.etc:/radarr/etc"
      - ${ARR_BACKUPS}/radarr:/config/backups
      - ${FILESHARE}:/data
      - *certs-volume
    tmpfs:
      - "/tmp:uid=${PUID},gid=${PGID}"
    network_mode: "service:gluetun"
    restart: "unless-stopped"
    labels:
      <<: *arr-labels
      homepage.name: Radarr
      homepage.icon: radarr.png
      homepage.description: Download Movies
      homepage.href: https://radarr.${DOMAIN}
      homepage.weight: 30
      homepage.widget.type: radarr
      homepage.widget.url: https://docker.internal.${DOMAIN}:9898
      homepage.widget.key: ${RADARR_API_KEY}

  prowlarr:
    image: "11notes/prowlarr:2.3.0"
    container_name: prowlarr
    read_only: true
    profiles: ['arr']
    user: ${PUID}:${PGID}
    environment:
      TZ: ${TZ}
    volumes:
      - "prowlarr.etc:/prowlarr/etc"
      - ${ARR_BACKUPS}/prowlarr:/config/backups
      - *certs-volume
    tmpfs:
      - "/tmp:uid=${PUID},gid=${PGID}"
    network_mode: "service:gluetun"
    restart: "unless-stopped"
    labels:
      <<: *arr-labels
      homepage.name: Prowlarr
      homepage.icon: prowlarr.png
      homepage.description: Index Manager
      homepage.href: https://prowlarr.${DOMAIN}
      homepage.weight: 31

  huntarr:
    image: "huntarr/huntarr:9.2.0"
    container_name: huntarr
    profiles: ['arr']
    user: ${PUID}:${PGID}
    environment:
      <<: *common-env
    volumes:
      - "huntarr.conf:/config"
    network_mode: "service:gluetun"
    restart: "unless-stopped"
    labels:
      <<: *arr-labels
      homepage.name: Huntarr
      homepage.icon: huntarr.png
      homepage.description: Fetch media upgrades
      homepage.href: https://huntarr.${DOMAIN}
      homepage.weight: 31

# -----END------

  immich-machine-learning:
    container_name: immich_machine_learning
    profiles: ['immich']
    image: ghcr.io/immich-app/immich-machine-learning:${IMMICH_VERSION:-release}-openvino
    volumes:
      - "immich_model-cache:/cache"
    env_file:
      - .env.immich
    # External access
    ports:
      - 3003:3003
    extends:
      file: ${DOCKER_CONFIG}/immich/hwaccel.ml.yml
      service: openvino # [armnn, cuda, openvino, openvino-wsl]
    group_add:
      - '105'
    networks:
      - immichNet
    restart: always
    healthcheck:
      disable: false

volumes:
  jellyfin.conf:
  gluetun.conf:
  qbittorrent.etc:
  qbittorrent.var:
  sonarr.etc:
  radarr.etc:
  prowlarr.etc:
  huntarr.conf:
  immich_model-cache:
    external: true

networks:
  defaultNet:
    name: defaultNet
    driver: bridge
  arrNet:
    name: arrNet
    driver: bridge
  immichNet:
    name: immichNet
    driver: bridge
